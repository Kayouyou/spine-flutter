name: my_app
packages:
  - packages/domain
  - packages/infrastructure/*
  - packages/services/*
  - packages/features/*

scripts:
  analyze:
    run: |
      melos exec -- flutter analyze --no-fatal-infos --no-fatal-warnings
    description: 全量代码分析

  test:
    run: |
      melos exec -- flutter test
    description: 所有包测试

  test:affected:
    run: |
      melos exec --since=origin/main -- flutter test
    description: 只测变更相关包

  test:coverage:
    run: |
      melos exec -- flutter test --coverage
    description: 全量测试+覆盖率

  check:deps:
    run: |
      ./scripts/check_deps.sh
    description: 检查依赖方向 - feature 包不得引用 my_app

  check:coverage:
    run: |
      melos exec -- flutter test --coverage
      for dir in packages/*/*/coverage; do
        if [ -f "$dir/lcov.info" ]; then
          grep -q "SF:" "$dir/lcov.info" || { echo "No coverage data in $dir"; exit 1; }
        fi
      done
    description: 运行测试并检查覆盖率存在
