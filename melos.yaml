name: my_app
packages:
  - .
  - packages/domain
  - packages/infrastructure/*
  - packages/services/*
  - packages/features/*

scripts:
  analyze:
    run: |
      melos exec --flutter -- flutter analyze --no-fatal-infos --no-fatal-warnings && \
      melos exec --no-flutter -- dart analyze --no-fatal-warnings 2>/dev/null || true
    description: 全量代码分析（仅拦 error）

  test:
    run: |
      melos exec -- flutter test
    description: 所有包测试

  test:affected:
    run: |
      melos exec --diff=origin/main -- flutter test
    description: 只测变更相关包

  test:coverage:
    run: |
      melos exec -- flutter test --coverage
    description: 全量测试+覆盖率

  check:deps:
    run: |
      ./scripts/check_deps.sh
    description: 检查依赖方向 - feature 包不得引用 my_app

  check:versions:
    run: dart run scripts/check_workspace_versions.dart
    description: 检查 workspace 关键依赖版本是否漂移

  validate:
    run: |
      echo "▸ Step 1: 依赖方向检查..."
      ./scripts/check_deps.sh
      echo "▸ Step 2: 翻译一致性..."
      ./scripts/check_l10n.sh
      echo "▸ Step 3: 静态分析 (仅拦 error)..."
      melos exec -- flutter analyze --no-fatal-infos --no-fatal-warnings
      echo "▸ Step 4: 全量测试..."
      melos exec -- flutter test
      echo "✅ 全部通过 — 项目健康"
    description: 标准验收命令 — deps+l10n+analyze+test 一条跑完

  check:coverage:
    run: |
      melos exec -- flutter test --coverage
      for dir in packages/*/*/coverage; do
        if [ -f "$dir/lcov.info" ]; then
          grep -q "SF:" "$dir/lcov.info" || { echo "No coverage data in $dir"; exit 1; }
        fi
      done
    description: 运行测试并检查覆盖率存在
