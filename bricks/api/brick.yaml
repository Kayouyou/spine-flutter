name: api
description: 一键创建 API 调用模块（含 Retrofit 接口、RepositoryImpl、DI 注册）
version: 1.0.0
vars:
  name:
    type: string
    description: API 模块名称（蛇形命名）
    prompt: API 模块名称是什么？
  baseUrl:
    type: string
    description: API 基础 URL（如 '/api/v1'）
    prompt: API 基础路径是什么？
  hasModel:
    type: boolean
    description: 是否绑定数据模型
    default: false
  modelName:
    type: string
    description: 绑定的数据模型名称（仅在 hasModel 为 true 时有效）
    default: "dynamic"
