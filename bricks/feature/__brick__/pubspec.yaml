name: feature_{{name}}
description: {{name.pascalCase()}} 功能模块
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  get_it: ^7.6.0
  freezed_annotation: ^2.4.0
  go_router: ^14.0.0
  dio: ^5.4.0
  api:
    path: ../../infrastructure/api
  routing:
    path: ../../infrastructure/routing
  component_library:
    path: ../../infrastructure/component_library
  domain:
    path: ../../domain
  list_cache:
    path: ../../infrastructure/list_cache
  auth:
    path: ../../services/auth

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  build_runner: ^2.4.0
  freezed: ^2.4.0