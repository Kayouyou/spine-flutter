name: usecase
description: 生成 Domain 层 UseCase 类（含 Repository 依赖 + Result 返回类型）
version: 0.1.0
vars:
  name:
    type: string
    description: UseCase 名称 (不含 UseCase 后缀, 如 getUser)
    prompt: UseCase 名称是什么？
  repository:
    type: string
    description: Repository 接口名 (不含 I 前缀, 如 User → IUserRepository)
    prompt: Repository 接口名是什么？(如 User, Order)
