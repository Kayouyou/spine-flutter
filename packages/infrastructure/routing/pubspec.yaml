name: routing
description: GoRouter setup with RouteModule pattern
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  go_router: ^14.2.7
  auth:
    path: ../../services/auth
  feature_auth:
    path: ../../features/feature_auth
  feature_home:
    path: ../../features/feature_home
  feature_detail:
    path: ../../features/feature_detail
  feature_settings:
    path: ../../features/feature_settings

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
