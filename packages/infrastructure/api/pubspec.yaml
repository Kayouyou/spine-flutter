name: api
description: HTTP client based on Dio with mixin pattern
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.2.0+1
  rxdart: ^0.27.1
  key_value_storage:
    path: ../key_value_storage
  domain_models:
    path: ../../domain_models
  crypto: ^3.0.3
  uuid: ^4.5.0
  synchronized: ^3.1.0
  queue: ^3.1.0+2
  pretty_dio_logger: ^1.3.1
  connectivity_plus: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
