name: api
description: HTTP client based on Dio with mixin pattern
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.2.0+1
  rxdart: ^0.27.1
  key_value_storage:
    path: ../key_value_storage
  domain:
    path: ../../domain
  crypto: ^3.0.3
  uuid: ^4.5.0
  synchronized: ^3.1.0
  queue: ^3.1.0+2
  pretty_dio_logger: ^1.3.1
  connectivity_plus: ^6.0.2
  retrofit: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  retrofit_generator: ^8.1.0
  build_runner: ^2.4.9
  json_serializable: ^6.7.1
  alice: ^1.0.0-dev.10
  alice_dio: ^1.0.4
