# GitHub Actions CI 流水线
# 在 push 和 PR 时自动运行：静态分析 → 测试 → 构建

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: 静态分析
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.10'
          channel: 'stable'
      - run: dart pub global activate melos
      - run: melos bs
      - name: 检查依赖方向
        run: ./scripts/check_deps.sh
      - name: 检查 ARB 翻译一致性
        run: ./scripts/check_l10n.sh
      - name: Scaffold health check
        run: make scaffold-check
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings

  test:
    name: 单元测试与 Bloc 测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.10'
          channel: 'stable'
      - run: dart pub global activate melos
      - run: melos bs
      - run: melos test

  build:
    name: 调试构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.10'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --debug
