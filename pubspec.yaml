name: my_app
description: A Flutter project scaffolded from ovsx infrastructure.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Infrastructure
  api:
    path: packages/infrastructure/api
  key_value_storage:
    path: packages/infrastructure/key_value_storage
  domain:
    path: packages/domain

  # ===== 业务服务层 =====
  auth:
    path: packages/services/auth
  data_sync:
    path: packages/services/data_sync
  network:
    path: packages/services/network
  locale:
    path: packages/services/locale

  # ===== 业务功能层 =====
  feature_home:
    path: packages/features/feature_home
  feature_detail:
    path: packages/features/feature_detail

  component_library:
    path: packages/infrastructure/component_library
  routing:
    path: packages/infrastructure/routing

  # Dependency Injection
  get_it: ^7.6.0
  equatable: ^2.0.5

  # State Management
  flutter_bloc: ^8.1.0

  # Network
  connectivity_plus: ^6.0.0

  # Internationalization
  intl: ^0.19.0

  # Common
  flutter_easyloading: ^3.0.5
  flutter_screenutil: ^5.9.0
  go_router: ^14.2.7
  rxdart: ^0.27.1
  dio: ^5.2.0+1
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Bloc Testing
  bloc_test: ^9.1.0
  mocktail: ^0.3.0

  # Code Generation
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

dependency_overrides:
  flutter_spinkit: 5.1.0

flutter:
  generate: true
  uses-material-design: true
