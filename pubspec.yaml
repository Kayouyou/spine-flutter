name: my_app
description: A Flutter project scaffolded from ovsx infrastructure.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Infrastructure
  api:
    path: packages/infrastructure/api
  key_value_storage:
    path: packages/infrastructure/key_value_storage
  list_cache:
    path: packages/infrastructure/list_cache
  domain:
    path: packages/domain

  # ===== 业务服务层 =====
  auth:
    path: packages/services/auth
  data_sync:
    path: packages/services/data_sync
  network:
    path: packages/services/network
  error:
    path: packages/services/error
  locale:
    path: packages/services/locale

  # ===== 业务功能层 =====
  feature_home:
    path: packages/features/feature_home
  feature_detail:
    path: packages/features/feature_detail
  feature_auth:
    path: packages/features/feature_auth
  feature_settings:
    path: packages/features/feature_settings

  component_library:
    path: packages/infrastructure/component_library
  routing:
    path: packages/infrastructure/routing

  # Dependency Injection
  get_it: ^7.6.0
  equatable: ^2.0.5

  # State Management
  flutter_bloc: ^9.1.1

  # ===== 状态管理扩展 =====
  hydrated_bloc: ^11.0.0    # 状态持久化（LocaleCubit 用）
  replay_bloc: ^0.3.0       # undo/redo 支持（预集成）
  bloc_concurrency: ^0.3.0  # 并发控制（预集成）

  # ===== 代码生成 =====
  freezed_annotation: ^2.4.0 # 不可变模型注解

  # Network
  connectivity_plus: ^6.0.0

  # Internationalization
  intl: ^0.19.0

  # Common
  flutter_easyloading: ^3.0.5
  flutter_screenutil: ^5.9.0
  go_router: ^14.2.7
  path_provider: ^2.0.2
  rxdart: ^0.27.1
  dio: ^5.2.0+1
  cupertino_icons: ^1.0.2
  
  # 错误监控与强制更新
  sentry_flutter: ^8.13.0
  upgrader: ^10.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Bloc Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  import_sorter: ^4.6.0

  # Code Generation
  build_runner: ^2.4.8
  flutter_gen_runner: ^5.7.0
  freezed: ^2.4.0            # freezed 代码生成器
  hive_generator: ^2.0.0

  # App 图标与启动页
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.1

dependency_overrides:
  flutter_spinkit: 5.1.0

flutter:
  generate: true
  uses-material-design: true

  # ===== 资源目录 =====
  assets:
    - assets/images/
    - assets/fonts/

# ===== App 图标配置（flutter_launcher_icons）=====
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"

# ===== 启动页配置（flutter_native_splash）=====
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/splash.png
  android: true
  ios: true

# ===== flutter_gen 强类型资源管理 =====
flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: false

  assets:
    enabled: true
    outputs:
      class_name: Assets
      package_parameter_enabled: false

  fonts:
    enabled: false
  colors:
    enabled: false
